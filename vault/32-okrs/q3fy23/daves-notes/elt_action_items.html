  .filter-btn:hover { background: var(--color-background-secondary); }
  .filter-btn.active { background: var(--color-background-secondary); color: var(--color-text-primary); border-color: var(--color-border-primary); font-weight: 500; }
  .item { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start; }
  .item:hover { border-color: var(--color-border-secondary); }
  .rank { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); min-width: 22px; padding-top: 2px; }
  .body { flex: 1; }
  .item-header { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 5px; }
  .item-title { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; white-space: nowrap; }
  .badge-critical { background: #FCEBEB; color: #A32D2D; }
  .badge-high { background: #FAEEDA; color: #854F0B; }
  .badge-medium { background: #E6F1FB; color: #185FA5; }
  .badge-low { background: #EAF3DE; color: #3B6D11; }
  .tag { font-size: 11px; padding: 2px 9px; border-radius: 20px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); white-space: nowrap; }
  .item-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.55; }
  .owner { font-size: 12px; color: var(--color-text-tertiary); margin-top: 5px; }
</style>

let currentFilter = 'all';

function filter(val, btn) {
  currentFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const list = document.getElementById('list');
  const filtered = currentFilter === 'all' ? items : items.filter(i => i.priority === currentFilter || i.area === currentFilter);
  list.innerHTML = filtered.map(i => `
    <div class="item">
      <div class="rank">#${i.rank}</div>
      <div class="body">
        <div class="item-header">
          <span class="item-title">${i.title}</span>
          <span class="badge badge-${i.priority.toLowerCase()}">${i.priority}</span>
          <span class="tag">${i.area}</span>
        </div>
        <div class="item-desc">${i.desc}</div>
        <div class="owner">Owner: ${i.owner}</div>
      </div>
    </div>
  `).join('');
}
