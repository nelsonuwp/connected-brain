{% if mssql_error %}
<p class="related-warn small">{{ mssql_error }}</p>
{% elif not components %}
<p class="muted small">No component data found.</p>
{% else %}
<ul class="hw-comp-list asset-comp-list">
    {% for c in components %}
    <li class="hw-comp-item">{{ c.component_category }}/{{ c.component_type }} — {{ c.component }}</li>
    {% endfor %}
</ul>
{% endif %}
