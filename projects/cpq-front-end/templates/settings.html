<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPQ — Settings · Aptum</title>
  <style>
    @font-face { font-family:'Geist'; src:url('https://aptumlogos.pages.dev/Geist-Light.ttf') format('truetype'); font-weight:300; font-display:swap; }
    @font-face { font-family:'Geist'; src:url('https://aptumlogos.pages.dev/Geist-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }
    @font-face { font-family:'Geist'; src:url('https://aptumlogos.pages.dev/Geist-Medium.ttf') format('truetype'); font-weight:500; font-display:swap; }
    @font-face { font-family:'Geist'; src:url('https://aptumlogos.pages.dev/Geist-Bold.ttf') format('truetype'); font-weight:700; font-display:swap; }
    @font-face { font-family:'Geist Mono'; src:url('https://aptumlogos.pages.dev/GeistMono-Regular.ttf') format('truetype'); font-weight:400; font-display:swap; }

    :root {
      --bg:           #081820;
      --bg-dot:       #142233;
      --surface:      #0d1f2d;
      --surface-2:    #060f15;
      --border:       #142233;
      --border-mid:   #1e3547;
      --text-1:       #F8F7FA;
      --text-2:       #88898D;
      --text-3:       #515357;
      --accent:       #7D7AE8;
      --accent-dim:   #2A1F6E;
      --accent-text:  #D4D3FF;
      --green:        #BED6A8;
      --green-dim:    #1a3d1f;
      --orange:       #FFBE81;
      --orange-dim:   #3d1a06;
      --red:          #ef4444;
      --shadow:       rgba(0,0,0,.25);
    }
    [data-theme="light"] {
      --bg:           #F8F7FA;
      --bg-dot:       #D0D1DE;
      --surface:      #FFFFFF;
      --surface-2:    #F0EFF5;
      --border:       #D0D1DE;
      --border-mid:   #88898D;
      --text-1:       #081820;
      --text-2:       #515357;
      --text-3:       #88898D;
      --accent:       #655BD9;
      --accent-dim:   #E7E6FF;
      --accent-text:  #3A2699;
      --green:        #2d6e1f;
      --green-dim:    #E9FEDF;
      --orange:       #a05000;
      --orange-dim:   #FFEBD9;
      --red:          #c41c1c;
      --shadow:       rgba(0,0,0,.06);
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family:'Geist', system-ui, sans-serif;
      background-color: var(--bg);
      background-image: radial-gradient(var(--bg-dot) 1px, transparent 0);
      background-size: 28px 28px;
      color: var(--text-2);
      min-height: 100vh;
      padding: 2rem;
      transition: background-color .25s, color .25s;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 2rem; padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    header img.logo { height: 28px; width: auto; display: block; }
    .hdr-divider { width: 1px; height: 22px; background: var(--border); }
    .hdr-label { font-size: .75rem; color: var(--text-3); letter-spacing: .01em; }
    .hdr-right { margin-left: auto; display: flex; align-items: center; gap: .75rem; }

    .nav-link {
      font-size: .8rem; color: var(--text-2); text-decoration: none;
      padding: .35rem .75rem; border-radius: 7px; border: 1px solid var(--border);
      transition: border-color .15s, color .15s;
    }
    .nav-link:hover { border-color: var(--accent); color: var(--accent); }

    .theme-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-2); font-size: .9rem; line-height: 1;
      width: 34px; height: 34px; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: border-color .15s, background .2s;
    }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Page layout ── */
    .page-title {
      font-size: 1.1rem; font-weight: 600; color: var(--text-1);
      margin-bottom: 1.75rem;
    }

    /* ── Settings card ── */
    .settings-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 1.5rem;
      box-shadow: 0 2px 12px var(--shadow);
      margin-bottom: 1.5rem;
    }
    .card-header-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.25rem; gap: 1rem; flex-wrap: wrap;
    }
    .card-title {
      font-size: .9rem; font-weight: 600; color: var(--text-1);
    }
    .card-subtitle {
      font-size: .72rem; color: var(--text-3); margin-top: .2rem;
    }

    /* ── Service type tabs ── */
    .svc-tabs {
      display: flex; gap: .4rem;
    }
    .svc-tab {
      padding: .3rem .85rem; border-radius: 6px;
      font-size: .75rem; font-weight: 500; cursor: pointer;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-2); font-family: 'Geist', sans-serif;
      transition: background .15s, border-color .15s, color .15s;
    }
    .svc-tab:hover { border-color: var(--border-mid); color: var(--text-1); }
    .svc-tab.active {
      background: var(--accent-dim); border-color: var(--accent);
      color: var(--accent-text);
    }

    /* ── Cost matrix table ── */
    .matrix-wrap {
      overflow-x: auto;
      border: 1px solid var(--border); border-radius: 10px;
      margin-bottom: 1.25rem;
    }
    table {
      border-collapse: collapse; width: 100%; min-width: 700px;
      font-size: .78rem;
    }
    thead tr:first-child th {
      background: var(--surface-2); color: var(--text-3);
      font-size: .65rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; padding: .6rem .85rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    thead tr.currency-row th {
      background: var(--surface-2); color: var(--text-3);
      font-size: .62rem; font-family: 'Geist Mono', monospace;
      padding: .3rem .85rem .5rem;
      border-bottom: 1px solid var(--border-mid);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(125,122,232,.04); }

    td.row-label {
      padding: .6rem .85rem; white-space: nowrap;
      color: var(--text-2); font-weight: 500; min-width: 180px;
    }
    td.row-label .unit {
      display: block; font-size: .62rem; color: var(--text-3); margin-top: .1rem;
    }

    td.cell {
      padding: .35rem .5rem;
    }
    td.cell input {
      width: 80px; text-align: right;
      background: transparent; border: 1px solid transparent;
      border-radius: 5px; color: var(--text-1);
      font-family: 'Geist Mono', monospace; font-size: .78rem;
      padding: .3rem .45rem;
      transition: border-color .15s, background .15s;
      outline: none;
    }
    td.cell input:hover { border-color: var(--border-mid); }
    td.cell input:focus {
      border-color: var(--accent); background: var(--accent-dim);
      color: var(--accent-text);
    }
    td.cell input.modified { color: var(--orange); }

    /* ── Global inputs ── */
    .globals-row {
      display: flex; align-items: flex-end; gap: 2rem; flex-wrap: wrap;
      padding-top: 1rem; border-top: 1px solid var(--border);
      margin-top: .5rem;
    }
    .global-field { display: flex; flex-direction: column; gap: .3rem; }
    .global-field label {
      font-size: .63rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--text-3);
    }
    .global-field input {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text-1);
      font-family: 'Geist Mono', monospace; font-size: .85rem;
      padding: .45rem .75rem; width: 120px; outline: none;
      transition: border-color .15s;
    }
    .global-field input:focus { border-color: var(--accent); }
    .global-field .field-hint {
      font-size: .62rem; color: var(--text-3); margin-top: .1rem;
    }

    /* ── Action bar ── */
    .action-bar {
      display: flex; align-items: center; gap: .75rem; margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .btn {
      padding: .5rem 1.25rem; border-radius: 8px; font-size: .82rem;
      font-weight: 500; font-family: 'Geist', sans-serif; cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .btn-primary:hover { background: var(--accent-text); border-color: var(--accent-text); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-ghost {
      background: transparent; border-color: var(--border); color: var(--text-2);
    }
    .btn-ghost:hover { border-color: var(--border-mid); color: var(--text-1); }

    .toast {
      font-size: .78rem; padding: .4rem .85rem; border-radius: 6px;
      opacity: 0; transition: opacity .25s;
    }
    .toast.show { opacity: 1; }
    .toast.ok  { background: var(--green-dim); color: var(--green); }
    .toast.err { background: var(--orange-dim); color: var(--orange); }

    /* ── Spinner ── */
    .spinner {
      display:inline-block; width:14px; height:14px;
      border:2px solid var(--border); border-top-color:#fff;
      border-radius:50%; animation:spin .7s linear infinite;
      vertical-align:middle; margin-right:5px;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<header>
  <img id="main-logo" class="logo"
       src="https://aptumlogos.pages.dev/Aptum-Logo-Horizontal-Lockup-White.png" alt="Aptum" />
  <div class="hdr-divider"></div>
  <span class="hdr-label">Settings</span>
  <div class="hdr-right">
    <a class="nav-link" href="/">← Server Pricing</a>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" aria-label="Toggle colour scheme">☀</button>
  </div>
</header>

<div class="page-title">Settings</div>

<!-- Internal Costs -->
<div class="settings-card">
  <div class="card-header-row">
    <div>
      <div class="card-title">Internal Costs</div>
      <div class="card-subtitle">Overhead rates per data center, in each DC's native currency</div>
    </div>
    <div class="svc-tabs" id="svc-tabs">
      <button class="svc-tab active" data-svc="server"   onclick="switchTab(this)">Server</button>
      <button class="svc-tab"        data-svc="firewall" onclick="switchTab(this)">Firewall</button>
      <button class="svc-tab"        data-svc="switch"   onclick="switchTab(this)">Switch</button>
    </div>
  </div>

  <div class="matrix-wrap">
    <table id="cost-table">
      <thead>
        <tr id="dc-header-row">
          <th>Cost Category</th>
          <!-- DC columns injected by JS -->
        </tr>
        <tr class="currency-row" id="currency-row">
          <th></th>
          <!-- currency sub-headers injected by JS -->
        </tr>
      </thead>
      <tbody id="cost-tbody">
        <!-- rows injected by JS -->
      </tbody>
    </table>
  </div>

  <div class="globals-row">
    <div class="global-field">
      <label for="sga-pct">G&amp;A %</label>
      <input type="number" id="sga-pct" step="0.01" min="0" max="100" placeholder="8.2" />
      <div class="field-hint">% of total MRC — applies to all DCs &amp; types</div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-primary" id="save-btn" onclick="saveSettings()">Save</button>
    <button class="btn btn-ghost"   onclick="resetForm()">Reset</button>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
// ── Row definitions ───────────────────────────────────────────────────────
const ROWS = [
  { key: 'power_per_kw',       label: 'Power',              unit: '$/kW'    },
  { key: 'dc_equipment',       label: 'DC Equipment',       unit: '$/device' },
  { key: 'network_equipment',  label: 'Network Equipment',  unit: '$/device' },
  { key: 'dc_ops',             label: 'DC Ops',             unit: '$/device' },
  { key: 'support_ops',        label: 'Support Ops',        unit: '$/device' },
  { key: 'network_ops',        label: 'Network Ops',        unit: '$/device' },
  { key: 'compute_ops',        label: 'Compute Ops',        unit: '$/device' },
];

const SVC_TYPES = ['server', 'firewall', 'switch'];

let _data = null;       // raw cost_drivers.json
let _curSvc = 'server'; // active service type tab

// ── Load ──────────────────────────────────────────────────────────────────
async function loadData() {
  const res = await fetch('/api/settings/overhead');
  _data = await res.json();
  renderTable();
  document.getElementById('sga-pct').value =
    ((_data.overhead_constants.sga_pct || 0) * 100).toFixed(4).replace(/\.?0+$/, '');
}

// ── Render ────────────────────────────────────────────────────────────────
function renderTable() {
  const dcs = Object.keys(_data.data_centers);

  // Header row
  const hdrRow = document.getElementById('dc-header-row');
  const curRow = document.getElementById('currency-row');
  // Keep first <th> (label column), replace the rest
  while (hdrRow.children.length > 1) hdrRow.removeChild(hdrRow.lastChild);
  while (curRow.children.length > 1) curRow.removeChild(curRow.lastChild);

  for (const dc of dcs) {
    const th = document.createElement('th');
    th.textContent = dc;
    hdrRow.appendChild(th);

    const tc = document.createElement('th');
    tc.textContent = _data.data_centers[dc].native_currency;
    curRow.appendChild(tc);
  }

  // Body rows
  const tbody = document.getElementById('cost-tbody');
  tbody.innerHTML = '';

  for (const row of ROWS) {
    const tr = document.createElement('tr');

    const labelTd = document.createElement('td');
    labelTd.className = 'row-label';
    labelTd.innerHTML = `${row.label}<span class="unit">${row.unit}</span>`;
    tr.appendChild(labelTd);

    for (const dc of dcs) {
      const td = document.createElement('td');
      td.className = 'cell';
      const input = document.createElement('input');
      input.type = 'number';
      input.step = '0.01';
      input.min = '0';
      input.dataset.dc  = dc;
      input.dataset.key = row.key;
      input.addEventListener('input', () => input.classList.add('modified'));

      const val = _data.data_centers[dc]?.costs?.[_curSvc]?.[row.key]?.amount ?? 0;
      input.value = val;

      td.appendChild(input);
      tr.appendChild(td);
    }

    tbody.appendChild(tr);
  }
}

function fillValues() {
  const inputs = document.querySelectorAll('#cost-tbody input');
  for (const input of inputs) {
    const val = _data.data_centers[input.dataset.dc]?.costs?.[_curSvc]?.[input.dataset.key]?.amount ?? 0;
    input.value = val;
    input.classList.remove('modified');
  }
}

// ── Tab switch ────────────────────────────────────────────────────────────
function switchTab(btn) {
  document.querySelectorAll('.svc-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  _curSvc = btn.dataset.svc;
  fillValues();
}

// ── Save ──────────────────────────────────────────────────────────────────
async function saveSettings() {
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving…';

  // Build payload — collect all three service types from DOM for current state
  // Start from _data so untouched types carry their existing values
  const payload = JSON.parse(JSON.stringify(_data));

  // Apply current tab's edits into _data first
  const inputs = document.querySelectorAll('#cost-tbody input');
  for (const input of inputs) {
    const val = parseFloat(input.value) || 0;
    if (payload.data_centers[input.dataset.dc]?.costs?.[_curSvc]?.[input.dataset.key]) {
      payload.data_centers[input.dataset.dc].costs[_curSvc][input.dataset.key].amount = val;
    }
  }

  const sgaRaw = parseFloat(document.getElementById('sga-pct').value) || 0;
  payload.overhead_constants.sga_pct = parseFloat((sgaRaw / 100).toFixed(6));

  try {
    const res = await fetch('/api/settings/overhead', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const json = await res.json();
    if (json.ok) {
      _data = payload;
      document.querySelectorAll('#cost-tbody input').forEach(i => i.classList.remove('modified'));
      showToast('Saved ✓', 'ok');
    } else {
      showToast(json.error || 'Save failed', 'err');
    }
  } catch (e) {
    showToast('Network error', 'err');
  }

  btn.disabled = false;
  btn.textContent = 'Save';
}

// ── Reset ─────────────────────────────────────────────────────────────────
async function resetForm() {
  const res = await fetch('/api/settings/overhead');
  _data = await res.json();
  fillValues();
  document.getElementById('sga-pct').value =
    ((_data.overhead_constants.sga_pct || 0) * 100).toFixed(4).replace(/\.?0+$/, '');
  document.querySelectorAll('#cost-tbody input').forEach(i => i.classList.remove('modified'));
  showToast('Reset to saved values', 'ok');
}

// ── Toast ─────────────────────────────────────────────────────────────────
let _toastTimer;
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Theme ─────────────────────────────────────────────────────────────────
const THEME_KEY = 'aptum-cpq-theme';
function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  localStorage.setItem(THEME_KEY, t);
  const btn  = document.getElementById('theme-btn');
  const logo = document.getElementById('main-logo');
  if (btn)  btn.textContent = t === 'dark' ? '☀' : '☽';
  if (logo) logo.src = t === 'dark'
    ? 'https://aptumlogos.pages.dev/Aptum-Logo-Horizontal-Lockup-White.png'
    : 'https://aptumlogos.pages.dev/Horizontal-Lockup-Black.png';
}
function toggleTheme() {
  applyTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
}
(function () {
  const saved     = localStorage.getItem(THEME_KEY);
  const preferred = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  applyTheme(saved || preferred);
})();

loadData();
</script>
</body>
</html>
