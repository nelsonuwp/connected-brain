# config/calendar_filter.yaml
# Controls which calendar events are excluded from the daily schedule.

filter:
  # showAs values to exclude. MS Graph values: free, tentative, busy, oof, workingElsewhere, unknown
  exclude_show_as:
    - "free"
    - "tentative"

  # Attendee count threshold: if more than this many attendees (excluding the user),
  # show "Company-wide" instead of individual names
  company_wide_threshold: 15
