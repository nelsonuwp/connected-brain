# people.yaml
# -----------
# Roster of known people for tracking item attribution.
# The LLM uses this to assign a vault slug to tracked_items.
#
# Format:
#   vault_slug: Display Name
#   (optionally add known aliases or email handles below the name)
#
# Aliases: variations of the name the LLM might see in email/Teams
# Handle: email address or Teams UPN (used for participant matching)

people:
